name: Automated Daily Commit

on:
  schedule:
    # This runs the script every day at 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger it manually too

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Modify file
      run: |
        echo "Last updated on: $(date)" > data.txt

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.txt
        git commit -m "Automated daily update [skip ci]" || exit 0
        git push